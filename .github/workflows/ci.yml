name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  install-audit:
    name: Install & Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root deps (npm ci)
        run: npm ci --no-audit --no-fund

      - name: npm audit (high+ only, production)
        # 개발 의존성 취약점은 별도 정책 — 프로덕션 빌드 반영분만 게이트
        run: npm audit --omit=dev --audit-level=high

      - name: Install backend deps
        working-directory: backend
        run: npm ci --no-audit --no-fund

      - name: npm audit backend
        working-directory: backend
        run: npm audit --omit=dev --audit-level=high

  syntax-check:
    name: Syntax Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: install-audit
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Node syntax check (backend + api)
        # node --check 는 파싱 오류만 잡음 — ESLint 대체가 아니라 최소 안전망
        run: |
          set -e
          find backend api -name '*.js' -not -path '*/node_modules/*' -print0 \
            | xargs -0 -n1 node --check

      - name: Deps-sync check (root vs backend package.json)
        # 루트 package.json 에 누락된 외부 require → 프로덕션 함수 MODULE_NOT_FOUND 예방
        run: node scripts/check-deps-sync.js

      - name: JSON config validate
        run: |
          set -e
          for f in package.json backend/package.json vercel.json railway.json; do
            [ -f "$f" ] && node -e "JSON.parse(require('fs').readFileSync('$f','utf8'))" && echo "ok: $f"
          done

      - name: HTML basic sanity (frontend/index.html exists & <html> present)
        run: |
          test -f frontend/index.html
          grep -q '<html' frontend/index.html
          grep -q '</html>' frontend/index.html

      - name: Frontend inline JS syntax check (classic <script> via vm.Script)
        # HTML sanity 는 <html> 존재만 확인 — 인라인 <script>(~3900줄) 구문은 미검증이었음.
        # classic inline script 만 vm.Script 로 검사. type="module"·application/ld+json·외부 src 는 skip.
        # node 내장 vm 사용 (신규 npm 의존성 없음).
        run: |
          node <<'SCRIPT'
          const fs = require('fs'), vm = require('vm');
          const html = fs.readFileSync('frontend/index.html', 'utf8');
          const re = /<script\b([^>]*)>([\s\S]*?)<\/script>/gi;
          let m, i = 0, errs = 0, checked = 0, skipped = 0;
          while ((m = re.exec(html))) {
          i++;
          const attrs = m[1] || '', code = m[2] || '';
          const tm = attrs.match(/type\s*=\s*["']([^"']+)["']/i);
          const type = tm ? tm[1].toLowerCase() : '';
          if (/\bsrc\s*=/.test(attrs)) { skipped++; continue; }
          if (type && !['text/javascript', 'application/javascript'].includes(type)) { skipped++; continue; }
          const startLine = html.slice(0, m.index).split('\n').length;
          try { new vm.Script(code, { filename: 'index.html#' + i + '@L' + startLine }); checked++; }
          catch (e) { errs++; console.error('SYNTAX ERROR script#' + i + ' @L' + startLine + ': ' + e.message); }
          }
          console.log('frontend inline JS: blocks=' + i + ' checked=' + checked + ' skipped=' + skipped + ' errors=' + errs);
          if (checked < 1) { console.error('No inline scripts checked — extractor regex likely broken'); process.exit(1); }
          process.exit(errs ? 1 : 0);
          SCRIPT

      - name: Clause XSS raw-pattern guard (P1 regression)
        # P1-A/t3 에서 escape 한 clause 렌더 패턴이 raw 로 재유입됐는지 정적 검사 (fallback 포함).
        # raw ${c.title}, ${c.title||''}, ${c.content || ''}, ${d.caution ?? ''} 등 → 실패.
        # ${_escHtml(c.title...)} 통과. 삼항 가드 ${d.caution ? `...${_escHtml(d.caution)}...` : ''} 도 통과(오탐 방지).
        # → field 직후 '}' 또는 '||'/'??' fallback 만 raw 로 판정. node 내장만 사용 (신규 의존성 없음).
        run: |
          node <<'SCRIPT'
          const fs = require('fs');
          const html = fs.readFileSync('frontend/index.html', 'utf8');
          const re = /\$\{\s*(?:c\.(?:title|content|reason|law|article|summary)|d\.caution)\s*(?:\}|(?:\|\||\?\?)[^}]*\})/;
          const hits = [];
          html.split('\n').forEach((ln, i) => { if (re.test(ln)) hits.push((i + 1) + ': ' + ln.trim().slice(0, 120)); });
          if (hits.length) { console.error('clause XSS raw-pattern 발견 (P1 회귀 — _escHtml 로 감싸야 함):'); hits.forEach(h => console.error('  ' + h)); process.exit(1); }
          console.log('clause XSS raw-pattern guard: OK (0 raw matches)');
          SCRIPT

      - name: Security regression guard (XSS raw-pattern 재유입 차단)
        # 2026-05 XSS 보강(e177c1b/bc027ff)에서 닫은 raw 패턴 재유입 정적 검사
        # (field-note memo textarea / exportClausePDF title / inline JSON .replace(&#39;) / setAlert raw JSON.stringify)
        run: node scripts/security-regression-check.js

  gitleaks:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # gitleaks 가 과거 커밋까지 스캔

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 개인/팀 무료 사용 — 라이선스 키 불필요
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: 'true'
          GITLEAKS_ENABLE_SUMMARY: 'true'

  prod-smoke:
    name: Production Smoke Test
    # master push(=squash merge) 직후에만 실행 — PR/feature 브랜치엔 스킵
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    timeout-minutes: 8
    needs: [syntax-check]
    steps:
      - uses: actions/checkout@v6

      - name: Wait for Vercel prod redeploy (up to 5min) + probe /api/health
        run: bash scripts/prod-smoke.sh
        env:
          SMOKE_HOST: https://myhomelog.vercel.app
